<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Healthcare Fog Dashboard</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    padding:20px;
}

h1,h2{text-align:center}

.status{
    text-align:center;
    font-size:18px;
    margin-bottom:20px;
}

.normal{color:green;font-weight:bold;}
.warning{color:orange;font-weight:bold;}
.critical{color:red;font-weight:bold;}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-bottom:30px;
}

th,td{
    padding:10px;
    border:1px solid #ddd;
    text-align:center;
}

th{
    background:#1976d2;
    color:white;
}
</style>
</head>

<body>

<h1>Smart Healthcare Monitoring Dashboard</h1>

<div class="status">
Patient P001 Status:
<span id="patientStatus">Loading...</span>
</div>

<h2>All Patients Health Overview</h2>

<table>
<thead>
<tr>
<th>Patient ID</th>
<th>Status</th>
<th>Heart Rate</th>
<th>SpO₂</th>
<th>Temperature</th>
<th>Acceleration</th>
<th>Last Update</th>
</tr>
</thead>

<tbody id="patientTable">
<tr><td colspan="7">Loading...</td></tr>
</tbody>
</table>

<h2>Critical Alerts</h2>

<table>
<thead>
<tr>
<th>ID</th>
<th>Patient</th>
<th>Type</th>
<th>Heart Rate</th>
<th>SpO₂</th>
<th>Temperature</th>
<th>Acceleration</th>
<th>Time</th>
</tr>
</thead>

<tbody id="alertTable">
<tr><td colspan="8">Loading...</td></tr>
</tbody>
</table>

<script>

const API="http://127.0.0.1:5000";

// ---------------- Alerts ----------------
async function loadAlerts(){
const r=await fetch(`${API}/api/alerts`);
const d=await r.json();

const t=document.getElementById("alertTable");
t.innerHTML="";

if(d.length==0){
t.innerHTML="<tr><td colspan=8>No alerts</td></tr>";
return;
}

d.forEach(a=>{
t.innerHTML+=`
<tr>
<td>${a.id}</td>
<td>${a.patient_id}</td>
<td>${a.alert_type}</td>
<td>${a.hr}</td>
<td>${a.spo2}</td>
<td>${a.temp}</td>
<td>${a.acc_mag}</td>
<td>${new Date(a.timestamp*1000).toLocaleString()}</td>
</tr>`;
});
}

// ---------------- Single Patient ----------------
async function loadPatientStatus(){
const r=await fetch(`${API}/api/patients/P001/status`);
const d=await r.json();
const s=document.getElementById("patientStatus");

if(d.status=="CRITICAL"){s.textContent="CRITICAL";s.className="critical";}
else if(d.status=="WARNING"){s.textContent="WARNING";s.className="warning";}
else{s.textContent="NORMAL";s.className="normal";}
}

// ---------------- All Patients ----------------
async function loadAllPatients(){

const r=await fetch(`${API}/api/patients`);
const d=await r.json();

const t=document.getElementById("patientTable");
t.innerHTML="";

if(d.length==0){
t.innerHTML="<tr><td colspan=7>No patients</td></tr>";
return;
}

d.forEach(p=>{

let color="green";
if(p.status=="CRITICAL")color="red";
if(p.status=="WARNING")color="orange";

t.innerHTML+=`
<tr style="color:${color};font-weight:bold;">
<td>${p.patient_id}</td>
<td>${p.status}</td>
<td>${p.hr}</td>
<td>${p.spo2}</td>
<td>${p.temp}</td>
<td>${p.acc_mag}</td>
<td>${new Date(p.timestamp*1000).toLocaleString()}</td>
</tr>`;
});
}

// refresh every 3 seconds
setInterval(()=>{
loadAlerts();
loadPatientStatus();
loadAllPatients();
},3000);

// initial load
loadAlerts();
loadPatientStatus();
loadAllPatients();

</script>

</body>
</html>
